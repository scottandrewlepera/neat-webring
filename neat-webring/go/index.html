<!DOCTYPE html>
<html lang="en">
<head>
  <title>Random Site – Neat Webring!</title>
  <meta http-equiv="Cache-Control" content="no-store">
  <link rel="stylesheet" href="../shared.css">
  <script src="../embed/js-yaml.min.js"></script>
  <style>
    .page-card {
      max-width: 400px;
      text-align: center;
    }
    .go-entering {
      font-size:   0.85em;
      color:       var(--nw-text-muted);
      margin:      0 0 0.25em;
    }
    .go-spinner {
      display:       inline-block;
      width:         2em;
      height:        2em;
      border:        3px solid var(--nw-border);
      border-top:    3px solid var(--nw-accent);
      border-radius: 50%;
      animation:     nw-spin 0.8s linear infinite;
      margin-bottom: 0.75em;
    }
    @keyframes nw-spin {
      to { transform: rotate(360deg); }
    }
    .go-status {
      color:     var(--nw-text-muted);
      font-size: 0.9em;
    }
    .no-sites-msg {
      margin-bottom: 1.25em;
    }
    .nsfw-pref-row {
      margin-top: 1.5em;
      font-size:  0.85em;
      color:      var(--nw-text-muted);
    }
    .nsfw-pref-row label { cursor: pointer; }
  </style>
</head>
<body>
  <div class="page-card">
    <div id="go-content"></div>
  </div>
  <script type="module" src="./go.js"></script>
</body>
</html>
